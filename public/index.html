<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriLens">
<meta name="theme-color" content="#080d1a">
<title>NutriLens</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080d1a;--surface:#0d1526;--surface2:#111d33;--border:#1a2540;--muted:#243050;
  --subtle:#3d5070;--secondary:#6b84a8;--text:#dce8f5;--bright:#f0f7ff;
  --purple:#7c6ff7;--purple2:#a78bfa;--blue:#38bdf8;--teal:#2dd4bf;
  --orange:#f97316;--green:#22d3a0;--red:#f46060;--yellow:#fbbf24;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* ── Header ── */
.hdr{padding:calc(var(--safe-top) + 12px) 18px 0;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px;color:var(--bright)}
.logo span{color:var(--purple2)}
.mode-pill{background:var(--muted);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--purple2);display:flex;align-items:center;gap:5px;border:none;cursor:pointer}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;gap:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 14px;font-size:12px;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;color:var(--subtle);cursor:pointer;white-space:nowrap;transition:all .2s;letter-spacing:.01em}
.tab.active{color:var(--purple2);border-bottom-color:var(--purple2)}

/* ── Content ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bot)+24px)}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;margin:12px 14px 0}
.card-sm{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px}
.card-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--subtle);margin-bottom:12px}
.card-accent{border-color:rgba(124,111,247,.3)}

/* ── Morning check-in ── */
.checkin{background:linear-gradient(135deg,#0d1a3a,#1a1040);border:1px solid rgba(124,111,247,.4);border-radius:18px;padding:16px;margin:12px 14px 0}
.checkin-title{font-size:13px;font-weight:700;color:var(--bright);margin-bottom:12px}
.tap-row{display:flex;gap:6px;margin-bottom:10px}
.tap-item{flex:1;background:var(--muted);border:1px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;border:none}
.tap-item.selected{background:rgba(124,111,247,.25);border:1px solid var(--purple)}
.tap-item-num{font-size:16px;font-weight:700;color:var(--text)}
.tap-item-label{font-size:9px;color:var(--subtle);margin-top:2px}
.tap-label{font-size:11px;color:var(--secondary);margin-bottom:6px}

/* ── Ring ── */
.ring-wrap{position:relative;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg);display:block}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-size:26px;font-weight:700;color:var(--bright);line-height:1;letter-spacing:-1px}
.ring-sub{font-size:10px;color:var(--subtle);margin-top:2px}

/* ── Balance ── */
.balance-big{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1}
.balance-label{font-size:11px;color:var(--subtle);margin-top:4px}
.stats-mini{font-size:11px;color:var(--subtle);line-height:2;margin-top:10px}
.stats-mini span{color:var(--secondary)}

/* ── Macro bars ── */
.mbar{margin-bottom:9px}
.mbar-top{display:flex;justify-content:space-between;font-size:11px;color:var(--secondary);margin-bottom:3px}
.mbar-val{color:var(--text);font-weight:600}
.mbar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.mbar-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* ── Quick log strip ── */
.quick-strip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:0 14px;margin-top:12px}
.quick-strip::-webkit-scrollbar{display:none}
.quick-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 10px;text-align:center;flex-shrink:0;cursor:pointer;transition:all .15s;min-width:72px;border:none}
.quick-card:active{transform:scale(.96)}
.quick-card-icon{font-size:24px;display:block;margin-bottom:4px}
.quick-card-label{font-size:10px;color:var(--secondary);font-weight:600}

/* ── Water tracker ── */
.water-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:4px}
.water-drop{font-size:22px;cursor:pointer;transition:transform .1s;line-height:1}
.water-drop:active{transform:scale(1.3)}
.water-drop.empty{opacity:.25;filter:grayscale(1)}

/* ── Buttons ── */
.btn{padding:10px 18px;border-radius:11px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s;font-family:inherit}
.btn:active{opacity:.7}
.btn-primary{background:var(--purple);color:#fff}
.btn-secondary{background:var(--muted);color:var(--text)}
.btn-ghost{background:transparent;color:var(--subtle)}
.btn-teal{background:rgba(45,212,191,.15);color:var(--teal);border:1px solid rgba(45,212,191,.3)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:9px}
.btn-full{width:100%}

/* ── Meal items ── */
.meal-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.meal-item:last-child{border-bottom:none}
.meal-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0}
.meal-icon{width:44px;height:44px;border-radius:8px;background:var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.meal-name{font-size:13px;font-weight:600;color:var(--bright)}
.meal-meta{font-size:11px;color:var(--subtle);margin-top:2px;line-height:1.5}
.del-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 0 0 6px;line-height:1;flex-shrink:0}

/* ── Activity ── */
.act-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-emoji{font-size:26px;line-height:1;width:36px;text-align:center}
.act-cal{font-size:18px;font-weight:700;color:var(--orange)}

/* ── Insight card ── */
.insight{background:linear-gradient(135deg,#0d1f35,#0d1a2a);border:1px solid rgba(56,189,248,.2);border-radius:14px;padding:14px;margin-top:10px}
.insight-icon{font-size:22px;margin-bottom:6px}
.insight-text{font-size:13px;color:var(--text);line-height:1.6}
.insight-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}

/* ── Progress ── */
.prog-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--purple),var(--teal));transition:width .6s ease}

/* ── Stat rows ── */
.stat-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--secondary)}
.stat-val{font-weight:600}

/* ── Badge ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}

/* ── Inputs ── */
.input{background:var(--muted);border:1px solid var(--border);border-radius:11px;padding:11px 14px;color:var(--text);font-size:15px;width:100%;outline:none;-webkit-appearance:none;font-family:inherit}
.input::placeholder{color:var(--subtle)}
textarea.input{resize:none}
select.input{appearance:none}
.label{font-size:12px;color:var(--subtle);margin-bottom:6px;display:block}

/* ── Modals ── */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:22px 22px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:calc(var(--safe-bot)+20px)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700;color:var(--bright)}
.modal-close{background:none;border:none;color:var(--subtle);font-size:22px;cursor:pointer;line-height:1}

/* ── Macro grid ── */
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.macro-cell{background:var(--bg);border-radius:10px;padding:10px 4px;text-align:center}
.macro-num{font-size:20px;font-weight:700;line-height:1}
.macro-lbl{font-size:9px;color:var(--subtle);margin-top:3px}

/* ── Quick activity grid ── */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.quick-act{background:var(--muted);border:none;border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;transition:background .15s}
.quick-act:active{background:var(--subtle)}
.quick-act-e{font-size:24px;display:block;margin-bottom:4px}
.quick-act-l{font-size:11px;color:var(--secondary)}

/* ── Chart ── */
.chart-wrap{width:100%}

/* ── Goal mode selector ── */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mode-card{background:var(--muted);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;border:none}
.mode-card.active{background:rgba(124,111,247,.2);border:1px solid var(--purple)}
.mode-emoji{font-size:24px;display:block;margin-bottom:4px}
.mode-name{font-size:12px;font-weight:700;color:var(--text)}
.mode-desc{font-size:10px;color:var(--subtle);margin-top:2px}

/* ── Error ── */
.err{background:rgba(244,96,96,.1);border:1px solid rgba(244,96,96,.3);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:10px}

/* ── Spinner ── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--muted);border-top-color:var(--purple);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── Utilities ── */
.row{display:flex;align-items:center;gap:8px}
.f1{flex:1}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.div{border-top:1px solid var(--border);margin:12px 0}
.tr{text-align:right}.tc{text-align:center}
.bold{font-weight:700}.sm{font-size:13px}.xs{font-size:11px}
.c-subtle{color:var(--subtle)}.c-sec{color:var(--secondary)}.c-bright{color:var(--bright)}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-orange{color:var(--orange)}.c-teal{color:var(--teal)}.c-purple{color:var(--purple2)}
.photo-prev{width:54px;height:54px;border-radius:8px;object-fit:cover}

/* ── Energy dots ── */
.edot{width:10px;height:10px;border-radius:50%;background:var(--muted);cursor:pointer;transition:background .15s;border:none}
.edot.on{background:var(--yellow)}

/* ── History bars ── */
.hbar-wrap{display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:8px}
.hbar{flex:1;border-radius:3px 3px 0 0;transition:height .4s ease;min-height:3px}
.hbar-label{font-size:9px;color:var(--subtle);text-align:center;margin-top:4px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">Nutri<span>Lens</span> 🔬</div>
      <button class="mode-pill" onclick="openModal('modeModal')">
        <span id="modeEmoji">🔥</span>
        <span id="modeName">Fat Loss</span>
      </button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="today" onclick="switchTab('today')">Today</button>
      <button class="tab" data-tab="activity" onclick="switchTab('activity')">Activity</button>
      <button class="tab" data-tab="nutrition" onclick="switchTab('nutrition')">Nutrition</button>
      <button class="tab" data-tab="body" onclick="switchTab('body')">Body</button>
      <button class="tab" data-tab="history" onclick="switchTab('history')">History</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- ── MEAL MODAL ── -->
<div class="backdrop" id="mealModal" style="display:none">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Log a Meal</div>
      <button class="modal-close" onclick="closeModal('mealModal')">×</button>
    </div>
    <div class="mb12">
      <label class="label">Describe the meal</label>
      <textarea class="input" id="mealDesc" rows="3" placeholder="e.g. Greek salad with halloumi, olives, cucumber and olive oil…"></textarea>
    </div>
    <div class="mb12">
      <label class="label">Photo — strongly recommended for complex meals</label>
      <div class="row">
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('photoIn').click()">📷 Photo</button>
        <img id="photoPrev" class="photo-prev" style="display:none">
        <button class="btn btn-ghost btn-sm" id="removePhoto" style="display:none" onclick="clearPhoto()">Remove</button>
      </div>
      <input type="file" id="photoIn" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
    </div>
    <div id="mealErr" class="err" style="display:none"></div>
    <div id="mealResult" style="display:none">
      <div style="background:var(--muted);border-radius:14px;padding:14px;margin-bottom:14px">
        <div class="row mb8">
          <div class="f1 bold c-bright" id="rName"></div>
          <span class="badge" id="rConf"></span>
        </div>
        <div class="macro-grid">
          <div class="macro-cell"><div class="macro-num c-purple" id="rCal"></div><div class="macro-lbl">kcal</div></div>
          <div class="macro-cell"><div class="macro-num" style="color:var(--purple2)" id="rPro"></div><div class="macro-lbl">protein g</div></div>
          <div class="macro-cell"><div class="macro-num c-teal" id="rCarb"></div><div class="macro-lbl">carbs g</div></div>
          <div class="macro-cell"><div class="macro-num c-orange" id="rFat"></div><div class="macro-lbl">fat g</div></div>
        </div>
        <div class="xs c-subtle mt8" id="rNotes"></div>
        <div class="xs mt8" id="rMacroTip" style="color:var(--teal)"></div>
      </div>
      <div class="row">
        <button class="btn btn-secondary f1" onclick="resetMeal()">Re-analyse</button>
        <button class="btn btn-primary" style="flex:2" onclick="confirmMeal()">Add to log</button>
      </div>
    </div>
    <div id="mealAnalyseBtn">
      <button class="btn btn-primary btn-full" onclick="analyseMeal()" id="analyseBtn">Analyse with AI</button>
    </div>
  </div>
</div>

<!-- ── ACTIVITY MODAL ── -->
<div class="backdrop" id="actModal" style="display:none">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Log Activity</div>
      <button class="modal-close" onclick="closeModal('actModal')">×</button>
    </div>
    <div class="quick-grid" id="quickActs"></div>
    <div class="mb12">
      <label class="label">Activity name</label>
      <input class="input" id="actName" placeholder="e.g. Morning run">
    </div>
    <div class="row mb12">
      <div class="f1">
        <label class="label">Duration (min)</label>
        <input class="input" id="actDur" type="number" placeholder="30" oninput="autoCalcCal()">
      </div>
      <div class="f1">
        <label class="label">Distance (km)</label>
        <input class="input" id="actDist" type="number" placeholder="optional" step="0.1">
      </div>
    </div>
    <div class="mb12">
      <label class="label">Calories burned <span class="xs c-subtle">(auto-calculated or override)</span></label>
      <input class="input" id="actCal" type="number" placeholder="auto">
    </div>
    <div id="actErr" class="err" style="display:none"></div>
    <button class="btn btn-primary btn-full" onclick="confirmAct()">Add Activity</button>
  </div>
</div>

<!-- ── WEIGHT MODAL ── -->
<div class="backdrop" id="weightModal" style="display:none">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Log Weight</div>
      <button class="modal-close" onclick="closeModal('weightModal')">×</button>
    </div>
    <div class="mb12">
      <label class="label">Your weight today (kg)</label>
      <input class="input" id="weightIn" type="number" step="0.05" placeholder="77.5">
    </div>
    <button class="btn btn-primary btn-full" onclick="confirmWeight()">Save</button>
  </div>
</div>

<!-- ── MODE MODAL ── -->
<div class="backdrop" id="modeModal" style="display:none">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Goal Mode</div>
      <button class="modal-close" onclick="closeModal('modeModal')">×</button>
    </div>
    <div class="xs c-subtle mb12">Your goal shapes AI suggestions, macro targets and activity recommendations. You can change this anytime.</div>
    <div class="mode-grid" id="modeGrid"></div>
    <button class="btn btn-primary btn-full mt12" onclick="closeModal('modeModal')">Done</button>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────

const SK = "nutrilens_v5";

const PROFILE = {
  name:"Alex", height:173, weight:77.55, age:33, sex:"male",
  targetWeight:70, location:"Cyprus", climate:"hot_mediterranean",
  workStart:"08:00", workEnd:"14:00",
  trainWindows:["06:00-08:00","14:30-19:00"],
  eatTimes:["11:00","14:30","17:00"],
  context:"Works 8am-2pm. Hot Mediterranean climate. Two young children. Family meals — no ingredient weighing. Runs 30km/week, walks 25km/week. No gym currently but has access."
};

const MODES = [
  {id:"fat_loss",     emoji:"🔥", name:"Fat Loss",     desc:"500 kcal deficit, high protein", macros:{protein:160,carbs:180,fat:65},  color:"#f97316"},
  {id:"testosterone", emoji:"💪", name:"Testosterone",  desc:"Zinc, D, healthy fats, sleep",   macros:{protein:150,carbs:200,fat:80},  color:"#a78bfa"},
  {id:"abs",          emoji:"🎯", name:"Core & Abs",    desc:"Deficit + core focus",            macros:{protein:165,carbs:160,fat:60},  color:"#38bdf8"},
  {id:"energy",       emoji:"⚡", name:"Energy",        desc:"Carb timing, sleep, HRV",         macros:{protein:140,carbs:220,fat:70},  color:"#fbbf24"},
  {id:"endurance",    emoji:"🏃", name:"Endurance",     desc:"Carb fuelling, recovery",         macros:{protein:145,carbs:240,fat:65},  color:"#22d3a0"},
  {id:"maintain",     emoji:"⚖️", name:"Maintain",      desc:"TDEE balance",                    macros:{protein:140,carbs:200,fat:70},  color:"#6b84a8"},
];

const QUICK_ACTS = [
  {emoji:"🏃",name:"Run",     met:9.8 },
  {emoji:"🚶",name:"Walk",    met:3.5 },
  {emoji:"🚴",name:"Cycle",   met:7.5 },
  {emoji:"🏊",name:"Swim",    met:8.0 },
  {emoji:"🏋️",name:"Weights", met:5.0 },
  {emoji:"🧘",name:"Yoga",    met:2.5 },
];

// ─── State ────────────────────────────────────────────────────────────────────
let db = (() => {
  try { const r=localStorage.getItem(SK); return r?JSON.parse(r):freshDB(); }
  catch { return freshDB(); }
})();

function freshDB() {
  return {
    profile:{...PROFILE}, mode:"fat_loss",
    meals:{}, activities:{}, weights:{},
    checkins:{}, // {date:{sleep_hrs,sleep_q,energy,water}}
    insight:null, insightDate:null
  };
}
function save() { localStorage.setItem(SK, JSON.stringify(db)); }
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) { return new Date(d).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}); }

// ─── Calculations ─────────────────────────────────────────────────────────────
function bmr() {
  const p=db.profile;
  return Math.round(10*p.weight + 6.25*p.height - 5*p.age + 5);
}
function actBurn(date) {
  return (db.activities[date]||[]).reduce((s,a)=>s+(a.calories||0),0);
}
function tdee(date) { return bmr() + actBurn(date||today()); }
function target(date) {
  const mode = MODES.find(m=>m.id===db.mode)||MODES[0];
  const deficit = mode.id==="maintain"?0:500;
  return tdee(date) - deficit;
}
function eaten(date) { return (db.meals[date||today()]||[]).reduce((s,m)=>s+(m.calories||0),0); }
function macroTotal(date, key) { return (db.meals[date||today()]||[]).reduce((s,m)=>s+(m[key]||0),0); }
function bmi() {
  const p=db.profile; return (p.weight/((p.height/100)**2)).toFixed(1);
}
function bmiCat(b) {
  if(b<18.5) return{l:"Underweight",c:"var(--blue)"};
  if(b<25)   return{l:"Healthy",    c:"var(--green)"};
  if(b<30)   return{l:"Overweight", c:"var(--yellow)"};
  return            {l:"Obese",     c:"var(--red)"};
}
function metCal(met,min,kg) { return Math.round((met*kg*3.5/200)*min); }
function latestWeight() {
  const entries=Object.entries(db.weights).sort(([a],[b])=>b.localeCompare(a));
  return entries.length>0?entries[0][1]:db.profile.weight;
}
function currentMode() { return MODES.find(m=>m.id===db.mode)||MODES[0]; }
function macroTargets() { return currentMode().macros; }

let currentTab = "today";

function switchTab(tab) {
  currentTab=tab;

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const t=today(), mode=currentMode();
  document.getElementById("modeEmoji").textContent=mode.emoji;
  document.getElementById("modeName").textContent=mode.name;

  const el=document.getElementById("content");
  if(currentTab==="today")      el.innerHTML=renderToday();

}

  return html;

  // Calorie history
  html+=`<div class="card">

  if(allMeals.length===0) {
    html+=`<div style="text-align:center;color:var(--muted);font-size:13px;padding:16px 0">No history yet — start logging meals</div>`;
  } else {
    allMeals.forEach(([date,meals])=>{
      const total=meals.reduce((s,m)=>s+m.calories,0);
      const burn=actBurn(date);

      const ci=db.checkins[date]||{};
      html+=`<div class="act-item">
        <div style="width:36px;text-align:center;font-size:18px">${ci.energy?["🪫","😐","🙂","💪","⚡"][ci.energy-1]:"—"}</div>
        <div class="f1">
          <div class="sm bold">${fmtDate(date)}</div>
          <div class="xs c-subtle">${meals.length} meal${meals.length!==1?"s":""}${burn>0?" · 🏃 "+burn+" burned":""}</div>
        </div>
        <div class="tr">
          <div class="sm bold">${total} kcal</div>
          <div class="xs ${diff<=0?"c-green":"c-red"}">${diff<=0?"−"+Math.abs(diff):"+"+diff} vs target</div>
        </div>
      </div>`;
    });
  }
  html+=`</div>`;

  // Sleep history
  const sleepEntries=Object.entries(db.checkins).filter(([,ci])=>ci.sleep_hrs).sort(([a],[b])=>b.localeCompare(a)).slice(0,7);
  if(sleepEntries.length>0) {
    html+=`<div class="card">
      <div class="card-title">Sleep log</div>
      ${sleepEntries.map(([date,ci])=>`
        <div class="act-item">
          <div style="font-size:22px">😴</div>
          <div class="f1">
            <div class="sm bold">${fmtDate(date)}</div>
            <div class="xs c-subtle">${ci.sleep_hrs}h · quality ${ci.sleep_q||"?"}/5</div>
          </div>
          <div class="xs c-subtle">${["🪫","😐","🙂","💪","⚡"][(ci.energy||3)-1]} energy</div>
        </div>`).join("")}
    </div>`;
  }

  return html;
}

// ─── HTML helpers ─────────────────────────────────────────────────────────────
function mbar(label,val,max,color) {
  const pct=Math.min(val/max*100,100).toFixed(1);
  return `<div class="mbar">
    <div class="mbar-top"><span>${label}</span><span class="mbar-val">${Math.round(val)}g</span></div>
    <div class="mbar-track"><div class="mbar-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function weightChart(weights) {
  const entries=Object.entries(weights).sort(([a],[b])=>a.localeCompare(b)).slice(-14);
  if(entries.length<2) return `<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px 0">Log at least 2 weights to see trend</div>`;
  const vals=entries.map(([,v])=>v), mn=Math.min(...vals)-.5, mx=Math.max(...vals)+.5;
  const W=280,H=80,px=i=>(i/(entries.length-1))*W,py=v=>H-((v-mn)/(mx-mn))*H;
  const pts=entries.map(([,v],i)=>`${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(" ");
  return `<div class="chart-wrap"><svg width="100%" viewBox="0 0 ${W} ${H+24}" style="overflow:visible">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c6ff7" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#7c6ff7" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="0,${H} ${pts} ${W},${H}" fill="url(#wg)"/>
    <polyline points="${pts}" fill="none" stroke="#7c6ff7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${entries.map(([,v],i)=>`<circle cx="${px(i).toFixed(1)}" cy="${py(v).toFixed(1)}" r="3.5" fill="#7c6ff7"/>`).join("")}
    <text x="0" y="${H+18}" font-size="10" fill="#3d5070">${entries[0][0].slice(5)}</text>
    <text x="${W}" y="${H+18}" font-size="10" fill="#3d5070" text-anchor="end">${entries[entries.length-1][0].slice(5)}</text>
    <text x="${W+4}" y="${py(vals[vals.length-1]).toFixed(1)}" font-size="10" fill="#7c6ff7" dominant-baseline="middle">${vals[vals.length-1]}kg</text>
  </svg></div>`;
}

function mealEmoji(name) {
  const n=(name||"").toLowerCase();
  if(n.includes("salad")) return "🥗";
  if(n.includes("egg")) return "🍳";
  if(n.includes("chicken")) return "🍗";
  if(n.includes("fish")||n.includes("salmon")) return "🐟";
  if(n.includes("pasta")||n.includes("rice")) return "🍝";
  if(n.includes("coffee")||n.includes("tea")) return "☕";
  if(n.includes("halloumi")||n.includes("cheese")) return "🧀";
  if(n.includes("sandwich")||n.includes("toast")) return "🥪";
  if(n.includes("fruit")||n.includes("apple")) return "🍎";
  if(n.includes("soup")) return "🥣";
  if(n.includes("yogurt")||n.includes("yoghurt")) return "🥛";
  return "🍽";
}

// ─── Check-in ─────────────────────────────────────────────────────────────────
let ciState={sleep_hrs:null,sleep_q:null,energy:null};

function setSleep(n) {
  ciState.sleep_hrs=n;
  document.querySelectorAll("[id^='sl_']").forEach(el=>el.classList.remove("selected"));
  document.getElementById("sl_"+n)?.classList.add("selected");
}
function setSleepQ(n) {
  ciState.sleep_q=n;
  document.querySelectorAll("[id^='sq_']").forEach(el=>el.classList.remove("selected"));
  document.getElementById("sq_"+n)?.classList.add("selected");
}
function setEnergy(n) {
  ciState.energy=n;
  document.querySelectorAll("[id^='en_']").forEach(el=>el.classList.remove("selected"));
  document.getElementById("en_"+n)?.classList.add("selected");
}
function doneCheckin() {
  if(!ciState.energy) { alert("Tap your energy level to continue"); return; }
  if(!db.checkins[today()]) db.checkins[today()]={};
  Object.assign(db.checkins[today()], ciState, {water:0});
  ciState={sleep_hrs:null,sleep_q:null,energy:null};
  save(); render();
}
function setWater(n) {
  if(!db.checkins[today()]) db.checkins[today()]={energy:3,water:0};
  db.checkins[today()].water=Math.max(0,Math.min(8,n));
  save(); render();
}

// ─── Meal modal ───────────────────────────────────────────────────────────────
function openModal(id) {
  if(id==="mealModal") {
    pendingMeal=null; pendingPhoto=null;
    document.getElementById("mealDesc").value="";
    document.getElementById("photoPrev").style.display="none";
    document.getElementById("removePhoto").style.display="none";
    document.getElementById("photoIn").value="";
    document.getElementById("mealErr").style.display="none";
    document.getElementById("mealResult").style.display="none";
    document.getElementById("mealAnalyseBtn").style.display="block";
    document.getElementById("analyseBtn").textContent="Analyse with AI";
    document.getElementById("analyseBtn").disabled=false;
  }
  if(id==="actModal") {
    document.getElementById("actName").value="";
    document.getElementById("actDur").value="";
    document.getElementById("actDist").value="";
    document.getElementById("actCal").value="";
    document.getElementById("actErr").style.display="none";
    document.getElementById("actName").dataset.emoji="💪";
    document.getElementById("actName").dataset.met="5";
    selectedActMET=null; selectedActEmoji="💪";
    document.getElementById("quickActs").innerHTML=QUICK_ACTS.map(a=>
      `<button class="quick-act" onclick="pickAct('${a.name}','${a.emoji}',${a.met})">
        <span class="quick-act-e">${a.emoji}</span><span class="quick-act-l">${a.name}</span>
      </button>`
    ).join("");
  }
  if(id==="modeModal") {
    document.getElementById("modeGrid").innerHTML=MODES.map(m=>
      `<button class="mode-card ${db.mode===m.id?"active":""}" onclick="setMode('${m.id}')">
        <span class="mode-emoji">${m.emoji}</span>
        <div class="mode-name">${m.name}</div>
        <div class="mode-desc">${m.desc}</div>
      </button>`
    ).join("");
  }
  document.getElementById(id).style.display="flex";
}
function closeModal(id) { document.getElementById(id).style.display="none"; }

function handlePhoto(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const [hdr,b64]=ev.target.result.split(",");
    pendingPhoto={base64:b64,mime:hdr.match(/:(.*?);/)[1],preview:ev.target.result};
    document.getElementById("photoPrev").src=ev.target.result;
    document.getElementById("photoPrev").style.display="block";
    document.getElementById("removePhoto").style.display="inline-block";
  };
  reader.readAsDataURL(file);
}
function clearPhoto() {
  pendingPhoto=null;
  document.getElementById("photoPrev").style.display="none";
  document.getElementById("removePhoto").style.display="none";
  document.getElementById("photoIn").value="";
}
function resetMeal() {
  pendingMeal=null;
  document.getElementById("mealResult").style.display="none";
  document.getElementById("mealAnalyseBtn").style.display="block";
}

async function analyseMeal() {
  const desc=document.getElementById("mealDesc").value.trim();
  if(!desc && !pendingPhoto) { showErr("mealErr","Add a description or photo"); return; }
  document.getElementById("mealErr").style.display="none";
  const btn=document.getElementById("analyseBtn");
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Analysing…';
  try {
    const mt=macroTargets();
    const content=[];
    if(pendingPhoto) content.push({type:"image",source:{type:"base64",media_type:pendingPhoto.mime,data:pendingPhoto.base64}});
    content.push({type:"text",text:`You are a nutrition expert familiar with Mediterranean and Cypriot cuisine.
Analyse this meal for someone with these goals: ${currentMode().name} mode, targets: protein ${mt.protein}g, carbs ${mt.carbs}g, fat ${mt.fat}g/day.
${desc?"Description: "+desc:"No description — use the image."}
Context: ${PROFILE.context}
Reply ONLY with valid JSON, no markdown:
{"calories":number,"protein":number,"carbs":number,"fat":number,"name":"concise meal name","confidence":"low|medium|high","notes":"one helpful insight about this meal for their goals","macroTip":"one specific tip e.g. add halloumi to hit protein target"}`});

    const r=await fetch("/api/claude",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:500,messages:[{role:"user",content}]})
    });
    if(!r.ok) throw new Error("API "+r.status);
    const d=await r.json();
    const text=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    const m=text.match(/\{[\s\S]*?\}/);
    if(!m) throw new Error("No JSON in response");
    pendingMeal=JSON.parse(m[0]);
    const cc={high:"var(--green)",medium:"var(--yellow)",low:"var(--red)"}[pendingMeal.confidence]||"var(--subtle)";
    document.getElementById("rName").textContent=pendingMeal.name||desc;
    document.getElementById("rConf").textContent=pendingMeal.confidence;
    document.getElementById("rConf").style.cssText=`background:${cc}22;color:${cc}`;
    document.getElementById("rCal").textContent=pendingMeal.calories;
    document.getElementById("rPro").textContent=pendingMeal.protein;
    document.getElementById("rCarb").textContent=pendingMeal.carbs;
    document.getElementById("rFat").textContent=pendingMeal.fat;
    document.getElementById("rNotes").textContent=pendingMeal.notes?"💡 "+pendingMeal.notes:"";
    document.getElementById("rMacroTip").textContent=pendingMeal.macroTip?"🎯 "+pendingMeal.macroTip:"";
    document.getElementById("mealAnalyseBtn").style.display="none";
    document.getElementById("mealResult").style.display="block";
  } catch(e) {
    showErr("mealErr","Analysis failed: "+e.message);
    btn.disabled=false; btn.textContent="Analyse with AI";
  }
}

function confirmMeal() {
  if(!pendingMeal) return;
  const t=today();
  const meal={
    id:Date.now().toString(),
    time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
    name:pendingMeal.name||document.getElementById("mealDesc").value.trim(),
    calories:pendingMeal.calories, protein:pendingMeal.protein,
    carbs:pendingMeal.carbs, fat:pendingMeal.fat,
    notes:pendingMeal.notes, confidence:pendingMeal.confidence,
    preview:pendingPhoto?.preview||null,
  };
  if(!db.meals[t]) db.meals[t]=[];
  db.meals[t].push(meal);
  save(); closeModal("mealModal"); render();
}

function delMeal(id) {
  const t=today();
  db.meals[t]=(db.meals[t]||[]).filter(m=>m.id!==id);
  save(); render();
}

// ─── Activity ─────────────────────────────────────────────────────────────────
function pickAct(name,emoji,met) {
  selectedActMET=met; selectedActEmoji=emoji;
  document.getElementById("actName").value=name;
  document.getElementById("actName").dataset.met=met;
  document.querySelectorAll(".quick-act").forEach(b=>b.style.background="");
  autoCalcCal();
  document.getElementById("actDur").focus();
}
function autoCalcCal() {
  const dur=parseInt(document.getElementById("actDur").value)||0;
  const met=parseFloat(document.getElementById("actName").dataset.met)||5;
  if(dur>0) document.getElementById("actCal").value=metCal(met,dur,db.profile.weight);
}
function confirmAct() {
  const name=document.getElementById("actName").value.trim();
  const dur=parseInt(document.getElementById("actDur").value)||0;
  const dist=parseFloat(document.getElementById("actDist").value)||0;
  const cal=parseInt(document.getElementById("actCal").value)||0;
  if(!name||dur<=0) { showErr("actErr","Enter activity and duration"); return; }
  const t=today();
  const act={id:Date.now().toString(),name,duration:dur,distance:dist||null,calories:cal,emoji:selectedActEmoji||"💪",time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
  if(!db.activities[t]) db.activities[t]=[];
  db.activities[t].push(act);
  save(); closeModal("actModal"); render();
}
function delAct(id) {
  const t=today();
  db.activities[t]=(db.activities[t]||[]).filter(a=>a.id!==id);
  save(); render();
}

// ─── Weight ───────────────────────────────────────────────────────────────────
function confirmWeight() {
  const w=parseFloat(document.getElementById("weightIn").value);
  if(isNaN(w)||w<30||w>300) return;
  db.weights[today()]=w; db.profile.weight=w;
  save(); closeModal("weightModal"); render();
}

// ─── Mode ─────────────────────────────────────────────────────────────────────
function setMode(id) {
  db.mode=id; save();
  document.querySelectorAll(".mode-card").forEach(c=>c.classList.toggle("active",c.onclick.toString().includes(`'${id}'`)));
  render();
}

// ─── AI Insight ───────────────────────────────────────────────────────────────
async function getInsight() {
  const t=today(), meals=db.meals[t]||[], acts=db.activities[t]||[];
  const ci=db.checkins[t]||{};
  const mode=currentMode();
  const mt=macroTargets();

  // Build context from last 7 days
  const days7=[...Array(7)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return d.toISOString().slice(0,10);});
  const weekSummary=days7.map(d=>{
    const ms=db.meals[d]||[], as=db.activities[d]||[], ci2=db.checkins[d]||{};
    return `${d}: ${ms.reduce((s,m)=>s+m.calories,0)} kcal eaten, ${actBurn(d)} burned, energy ${ci2.energy||"?"}`;
  }).join("\n");

  const prompt=`You are a smart personal health coach for Alex (33yr male, ${db.profile.weight}kg, ${db.profile.height}cm, Cyprus).
Goal: ${mode.name}. Target: protein ${mt.protein}g, carbs ${mt.carbs}g, fat ${mt.fat}g.
Context: ${PROFILE.context}

Today so far:
- Meals: ${meals.map(m=>`${m.name} (${m.calories}kcal, P:${m.protein}g)`).join(", ")||"none logged"}
- Activity: ${acts.map(a=>`${a.name} ${a.duration}min`).join(", ")||"none"}
- Sleep: ${ci.sleep_hrs||"?"}h quality ${ci.sleep_q||"?"}/5, energy ${ci.energy||"?"}/5
- Water: ${ci.water||0}/8 glasses

Last 7 days:
${weekSummary}

Give ONE specific, actionable, personalised insight for today. Be direct and practical — not generic. Consider their hot climate, family meals, running schedule. Max 2 sentences. No emojis in the text itself.`;

  try {
    const r=await fetch("/api/claude",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:150,messages:[{role:"user",content:prompt}]})
    });
    const d=await r.json();
    db.insight=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    db.insightDate=t;
    save(); render();
  } catch(e) { alert("Insight failed: "+e.message); }
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function showErr(id,msg) {
  const el=document.getElementById(id);
  el.textContent=msg; el.style.display="block";
}

function attachListeners() {
  // Close modals on backdrop tap
  document.querySelectorAll(".backdrop").forEach(b=>{
    b.onclick=e=>{ if(e.target===b) b.style.display="none"; };
  });
}

// Init
render();
</script>
