<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriLens">
<meta name="theme-color" content="#080d1a">
<link rel="manifest" href="/manifest.json">
<title>NutriLens</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080d1a;--surface:#0d1526;--surface2:#111d33;--border:#1a2540;--muted:#243050;
  --subtle:#3d5070;--secondary:#6b84a8;--text:#dce8f5;--bright:#f0f7ff;
  --purple:#7c6ff7;--purple2:#a78bfa;--blue:#38bdf8;--teal:#2dd4bf;
  --orange:#f97316;--green:#22d3a0;--red:#f46060;--yellow:#fbbf24;--strava:#f97316;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.hdr{padding:calc(var(--safe-top) + 12px) 18px 0;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px;color:var(--bright)}
.logo span{color:var(--purple2)}
.hdr-right{display:flex;align-items:center;gap:8px}
.mode-pill{background:var(--muted);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--purple2);display:flex;align-items:center;gap:5px;border:none;cursor:pointer}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;gap:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 14px;font-size:12px;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;color:var(--subtle);cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.active{color:var(--purple2);border-bottom-color:var(--purple2)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bot)+24px)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;margin:12px 14px 0}
.card-sm{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px}
.card-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--subtle);margin-bottom:12px}
.checkin{background:linear-gradient(135deg,#0d1a3a,#1a1040);border:1px solid rgba(124,111,247,.4);border-radius:18px;padding:16px;margin:12px 14px 0}
.checkin-title{font-size:13px;font-weight:700;color:var(--bright);margin-bottom:12px}
.tap-row{display:flex;gap:6px;margin-bottom:10px}
.tap-item{flex:1;background:var(--muted);border:1px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;border:none}
.tap-item.selected{background:rgba(124,111,247,.25);border:1px solid var(--purple)}
.tap-item-num{font-size:16px;font-weight:700;color:var(--text)}
.tap-item-label{font-size:9px;color:var(--subtle);margin-top:2px}
.tap-label{font-size:11px;color:var(--secondary);margin-bottom:6px}
.ring-wrap{position:relative;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg);display:block}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-size:26px;font-weight:700;color:var(--bright);line-height:1;letter-spacing:-1px}
.ring-sub{font-size:10px;color:var(--subtle);margin-top:2px}
.balance-big{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1}
.balance-label{font-size:11px;color:var(--subtle);margin-top:4px}
.stats-mini{font-size:11px;color:var(--subtle);line-height:2;margin-top:10px}
.stats-mini span{color:var(--secondary)}
.mbar{margin-bottom:9px}
.mbar-top{display:flex;justify-content:space-between;font-size:11px;color:var(--secondary);margin-bottom:3px}
.mbar-val{color:var(--text);font-weight:600}
.mbar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.mbar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.quick-strip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:0 14px;margin-top:12px}
.quick-strip::-webkit-scrollbar{display:none}
.quick-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 10px;text-align:center;flex-shrink:0;cursor:pointer;transition:all .15s;min-width:72px;border:none}
.quick-card:active{transform:scale(.96)}
.quick-card-icon{font-size:24px;display:block;margin-bottom:4px}
.quick-card-label{font-size:10px;color:var(--secondary);font-weight:600}
.btn{padding:10px 18px;border-radius:11px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s;font-family:inherit}
.btn:active{opacity:.7}
.btn-primary{background:var(--purple);color:#fff}
.btn-secondary{background:var(--muted);color:var(--text)}
.btn-ghost{background:transparent;color:var(--subtle)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:9px}
.btn-full{width:100%}
.log-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0}
.log-icon{width:44px;height:44px;border-radius:8px;background:var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.log-name{font-size:13px;font-weight:600;color:var(--bright)}
.log-meta{font-size:11px;color:var(--subtle);margin-top:2px;line-height:1.5}
.del-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 0 0 6px;line-height:1;flex-shrink:0}
.act-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-emoji{font-size:26px;line-height:1;width:36px;text-align:center}
.act-cal{font-size:18px;font-weight:700;color:var(--orange)}
.insight{background:linear-gradient(135deg,#0d1f35,#0d1a2a);border:1px solid rgba(56,189,248,.2);border-radius:14px;padding:14px;margin-top:10px}
.insight-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.insight-text{font-size:13px;color:var(--text);line-height:1.6}
.prog-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--purple),var(--teal));transition:width .6s ease}
.stat-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--secondary)}
.stat-val{font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.input{background:var(--muted);border:1px solid var(--border);border-radius:11px;padding:11px 14px;color:var(--text);font-size:15px;width:100%;outline:none;-webkit-appearance:none;font-family:inherit}
.input::placeholder{color:var(--subtle)}
textarea.input{resize:none}
select.input{appearance:none}
.label{font-size:12px;color:var(--subtle);margin-bottom:6px;display:block}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:22px 22px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:calc(var(--safe-bot)+20px)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700;color:var(--bright)}
.modal-close{background:none;border:none;color:var(--subtle);font-size:22px;cursor:pointer;line-height:1}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.macro-cell{background:var(--bg);border-radius:10px;padding:10px 4px;text-align:center}
.macro-num{font-size:20px;font-weight:700;line-height:1}
.macro-lbl{font-size:9px;color:var(--subtle);margin-top:3px}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.quick-act{background:var(--muted);border:none;border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;transition:background .15s}
.quick-act:active{background:var(--subtle)}
.quick-act-e{font-size:24px;display:block;margin-bottom:4px}
.quick-act-l{font-size:11px;color:var(--secondary)}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mode-card{background:var(--muted);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;border:none}
.mode-card.active{background:rgba(124,111,247,.2);border:1px solid var(--purple)}
.mode-emoji{font-size:24px;display:block;margin-bottom:4px}
.mode-name{font-size:12px;font-weight:700;color:var(--text)}
.mode-desc{font-size:10px;color:var(--subtle);margin-top:2px}
.err{background:rgba(244,96,96,.1);border:1px solid rgba(244,96,96,.3);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:10px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--muted);border-top-color:var(--purple);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.row{display:flex;align-items:center;gap:8px}
.f1{flex:1}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.div{border-top:1px solid var(--border);margin:12px 0}
.tr{text-align:right}.tc{text-align:center}
.bold{font-weight:700}.sm{font-size:13px}.xs{font-size:11px}
.c-subtle{color:var(--subtle)}.c-sec{color:var(--secondary)}.c-bright{color:var(--bright)}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-orange{color:var(--orange)}
.c-teal{color:var(--teal)}.c-purple{color:var(--purple2)}.c-blue{color:var(--blue)}
.photo-prev{width:54px;height:54px;border-radius:8px;object-fit:cover}
.hbar-wrap{display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:8px}
.hbar{flex:1;border-radius:3px 3px 0 0;transition:height .4s ease;min-height:3px}
.hbar-label{font-size:9px;color:var(--subtle);text-align:center;margin-top:4px}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:16px 0}
/* Drink type pill */
.type-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.type-pill{background:var(--muted);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s;border:none;color:var(--secondary)}
.type-pill.selected{background:rgba(56,189,248,.2);border:1px solid var(--blue);color:var(--blue)}
/* Hydration bar */
.hydro-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin:8px 0}
.hydro-fill{height:100%;border-radius:5px;transition:width .5s ease;background:linear-gradient(90deg,var(--blue),var(--teal))}
/* Micro badge */
.micro-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.micro-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
/* Measurement */
.meas-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">Nutri<span>Lens</span> 🔬</div>
      <div class="hdr-right">
        <button class="mode-pill" onclick="openModal('modeModal')">
          <span id="modeEmoji">🔥</span><span id="modeName">Fat Loss</span>
        </button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="today" onclick="switchTab('today')">Today</button>
      <button class="tab" data-tab="activity" onclick="switchTab('activity')">Activity</button>
      <button class="tab" data-tab="nutrition" onclick="switchTab('nutrition')">Nutrition</button>
      <button class="tab" data-tab="body" onclick="switchTab('body')">Body</button>
      <button class="tab" data-tab="history" onclick="switchTab('history')">History</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- LOG MODAL (food + drink combined) -->
<div class="backdrop" id="logModal" style="display:none">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="logModalTitle">Log Meal or Drink</div>
      <button class="modal-close" onclick="closeModal('logModal')">×</button>
    </div>
    <!-- Type selector: simple food/drink toggle -->
    <div class="mb8">
      <label class="label">What are you logging?</label>
      <div class="type-row">
        <button class="type-pill selected" onclick="setLogType('food')" id="typeFood">🍽 Food</button>
        <button class="type-pill" onclick="setLogType('drink')" id="typeDrink">🥤 Drink</button>
      </div>
    </div>
    <div class="mb12">
      <label class="label">Describe it <span class="xs c-subtle">(e.g. "large flat white" or "500ml water")</span></label>
      <textarea class="input" id="logDesc" rows="2" placeholder="e.g. Large flat white with oat milk…"></textarea>
    </div>
    <div class="mb12">
      <label class="label">Photo <span class="xs c-subtle" id="photoHint">— recommended for food & complex drinks</span></label>
      <div class="row">
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('photoIn').click()">📷 Photo</button>
        <img id="photoPrev" class="photo-prev" style="display:none">
        <button class="btn btn-ghost btn-sm" id="removePhoto" style="display:none" onclick="clearPhoto()">Remove</button>
      </div>
      <input type="file" id="photoIn" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
    </div>
    <div id="logErr" class="err" style="display:none"></div>
    <div id="logResult" style="display:none">
      <div style="background:var(--muted);border-radius:14px;padding:14px;margin-bottom:14px">
        <div class="row mb8"><div class="f1 bold c-bright" id="rName"></div><span class="badge" id="rConf"></span></div>
        <div id="rFoodMacros" style="display:none">
          <div class="macro-grid mb8">
            <div class="macro-cell"><div class="macro-num c-purple" id="rCal"></div><div class="macro-lbl">kcal</div></div>
            <div class="macro-cell"><div class="macro-num" style="color:var(--purple2)" id="rPro"></div><div class="macro-lbl">protein g</div></div>
            <div class="macro-cell"><div class="macro-num c-teal" id="rCarb"></div><div class="macro-lbl">carbs g</div></div>
            <div class="macro-cell"><div class="macro-num c-orange" id="rFat"></div><div class="macro-lbl">fat g</div></div>
          </div>
          <div class="micro-row" id="rMicros"></div>
        </div>
        <div id="rDrinkInfo" style="display:none">
          <div class="row" style="gap:16px;flex-wrap:wrap">
            <div class="macro-cell" style="background:var(--bg);border-radius:10px;padding:8px 12px"><div class="macro-num c-blue" id="rMl"></div><div class="macro-lbl">ml volume</div></div>
            <div class="macro-cell" style="background:var(--bg);border-radius:10px;padding:8px 12px"><div class="macro-num c-teal" id="rHydro"></div><div class="macro-lbl">hydration ml</div></div>
            <div class="macro-cell" style="background:var(--bg);border-radius:10px;padding:8px 12px"><div class="macro-num c-orange" id="rCaff"></div><div class="macro-lbl">caffeine mg</div></div>
            <div class="macro-cell" style="background:var(--bg);border-radius:10px;padding:8px 12px"><div class="macro-num c-purple" id="rDrinkCal"></div><div class="macro-lbl">kcal</div></div>
          </div>
        </div>
        <div class="xs c-subtle mt8" id="rNotes"></div>
        <div class="xs c-teal mt8" id="rTip"></div>
      </div>
      <div class="row">
        <button class="btn btn-secondary f1" onclick="resetLog()">Re-analyse</button>
        <button class="btn btn-primary" style="flex:2" onclick="confirmLog()">Add to log</button>
      </div>
    </div>
    <div id="logAnalyseBtn">
      <button class="btn btn-primary btn-full" onclick="analyseLog()" id="analyseBtn">Analyse with AI</button>
    </div>
  </div>
</div>

<!-- ACTIVITY MODAL -->
<div class="backdrop" id="actModal" style="display:none">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title">Log Activity</div><button class="modal-close" onclick="closeModal('actModal')">×</button></div>
    <div class="quick-grid" id="quickActs"></div>
    <div class="mb12"><label class="label">Activity name</label><input class="input" id="actName" placeholder="e.g. Morning run"></div>
    <div class="row mb12">
      <div class="f1"><label class="label">Duration (min)</label><input class="input" id="actDur" type="number" placeholder="30" oninput="autoCalcCal()"></div>
      <div class="f1"><label class="label">Distance (km)</label><input class="input" id="actDist" type="number" placeholder="optional" step="0.1"></div>
    </div>
    <div class="mb12"><label class="label">Calories burned <span class="xs c-subtle">(auto or override)</span></label><input class="input" id="actCal" type="number" placeholder="auto"></div>
    <div id="actErr" class="err" style="display:none"></div>
    <button class="btn btn-primary btn-full" onclick="confirmAct()">Add Activity</button>
  </div>
</div>

<!-- WEIGHT MODAL -->
<div class="backdrop" id="weightModal" style="display:none">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title">Log Weight & Measurements</div><button class="modal-close" onclick="closeModal('weightModal')">×</button></div>
    <div class="mb12"><label class="label">Weight (kg)</label><input class="input" id="weightIn" type="number" step="0.05" placeholder="77.5"></div>
    <div class="mb12"><label class="label">Waist circumference (cm) <span class="xs c-subtle">optional — monthly</span></label><input class="input" id="waistIn" type="number" step="0.5" placeholder="e.g. 88"></div>
    <div class="mb12"><label class="label">Resting heart rate (bpm) <span class="xs c-subtle">optional</span></label><input class="input" id="rhrIn" type="number" placeholder="e.g. 58"></div>
    <button class="btn btn-primary btn-full" onclick="confirmWeight()">Save</button>
  </div>
</div>

<!-- MODE MODAL -->
<div class="backdrop" id="modeModal" style="display:none">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title">Goal Mode</div><button class="modal-close" onclick="closeModal('modeModal')">×</button></div>
    <div class="xs c-subtle mb12">Your goal shapes AI suggestions and macro targets. Change anytime.</div>
    <div class="mode-grid" id="modeGrid"></div>
    <button class="btn btn-primary btn-full mt12" onclick="closeModal('modeModal')">Done</button>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const SK = "nutrilens_v7";
const STRAVA_CLIENT_ID = "261019";
const STRAVA_REDIRECT_URI = window.location.origin + "/strava-callback";

const PROFILE = {
  height:173, weight:77.55, age:33, sex:"male", targetWeight:70,
  location:"Cyprus", climate:"hot_mediterranean",
  context:"Works 8am-2pm Cyprus. Hot climate. Two young children. Family meals, no ingredient weighing. Runs ~30km/week, walks ~25km/week. Mediterranean/Cypriot diet."
};
const MODES = [
  {id:"fat_loss",    emoji:"🔥",name:"Fat Loss",    desc:"500 kcal deficit, high protein",  macros:{protein:160,carbs:180,fat:65}},
  {id:"testosterone",emoji:"💪",name:"Testosterone",desc:"Zinc, D3, healthy fats, sleep",   macros:{protein:150,carbs:200,fat:80}},
  {id:"abs",         emoji:"🎯",name:"Core & Abs",  desc:"Deficit + core focus",             macros:{protein:165,carbs:160,fat:60}},
  {id:"energy",      emoji:"⚡",name:"Energy",      desc:"Carb timing, sleep, hydration",    macros:{protein:140,carbs:220,fat:70}},
  {id:"endurance",   emoji:"🏃",name:"Endurance",   desc:"Carb fuelling, recovery",          macros:{protein:145,carbs:240,fat:65}},
  {id:"maintain",    emoji:"⚖️",name:"Maintain",    desc:"TDEE balance",                     macros:{protein:140,carbs:200,fat:70}},
];
const QUICK_ACTS = [
  {emoji:"🏃",name:"Run",met:9.8},{emoji:"🚶",name:"Walk",met:3.5},{emoji:"🚴",name:"Cycle",met:7.5},
  {emoji:"🏊",name:"Swim",met:8.0},{emoji:"🏋️",name:"Weights",met:5.0},{emoji:"🧘",name:"Yoga",met:2.5},
];
// Hydration effectiveness (% of volume that counts as hydration)
const HYDRO_FACTOR = {water:1.0,juice:0.85,other:0.9,coffee:0.6,alcohol:0.0,food:0.0};
// Daily targets
const HYDRO_TARGET_ML = 2500; // ml — higher in Cyprus heat
const CAFFEINE_LIMIT = 200;   // mg — cut after 2pm

// ── DB ────────────────────────────────────────────────────────────────────────
let db = (() => { try { const r=localStorage.getItem(SK); return r?JSON.parse(r):freshDB(); } catch{return freshDB();} })();
function freshDB() {
  return {
    profile:{...PROFILE}, mode:"fat_loss",
    logs:{},        // {date: [{id,time,type,name,calories,protein,carbs,fat,ml,hydro_ml,caffeine_mg,micros,notes,confidence,preview}]}
    activities:{}, weights:{},
    // weights entries: {date: {kg, waist_cm, rhr_bpm}}
    checkins:{},   // {date: {sleep_hrs,sleep_q,energy,water(legacy)}}
    stravaCache:{},
    stravaTokens:null, // {access_token, refresh_token, expires_at, athlete}

}
function save() { localStorage.setItem(SK,JSON.stringify(db)); }
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) { return new Date(d).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}); }

// ── Maths ─────────────────────────────────────────────────────────────────────
function bmr() { const p=db.profile; return Math.round(10*p.weight+6.25*p.height-5*p.age+5); }
function actBurn(d) { return [...(db.activities[d]||[]),...(db.stravaCache[d]||[])].reduce((s,a)=>s+(a.calories||0),0); }
function tdee(d) { return bmr()+actBurn(d||today()); }
function target(d) { return tdee(d)-(db.mode==="maintain"?0:500); }
function dayLogs(d) { return db.logs[d||today()]||[]; }
function eaten(d) { return dayLogs(d).filter(l=>l.type==="food").reduce((s,l)=>s+(l.calories||0),0)
  + dayLogs(d).filter(l=>l.type!=="food").reduce((s,l)=>s+(l.calories||0),0); }
function foodCals(d) { return dayLogs(d).filter(l=>l.type==="food").reduce((s,l)=>s+(l.calories||0),0); }
function drinkCals(d) { return dayLogs(d).filter(l=>l.type!=="food").reduce((s,l)=>s+(l.calories||0),0); }
function totalHydro(d) { return dayLogs(d).reduce((s,l)=>s+(l.hydro_ml||0),0); }
function totalCaffeine(d) { return dayLogs(d).reduce((s,l)=>s+(l.caffeine_mg||0),0); }
function macroSum(d,k) { return dayLogs(d).filter(l=>l.type==="food").reduce((s,l)=>s+(l[k]||0),0); }
function bmi() { const p=db.profile; return (p.weight/((p.height/100)**2)).toFixed(1); }
function bmiCat(b) {
  if(b<18.5) return{l:"Underweight",c:"var(--blue)"};
  if(b<25)   return{l:"Healthy",c:"var(--green)"};
  if(b<30)   return{l:"Overweight",c:"var(--yellow)"};
  return{l:"Obese",c:"var(--red)"};
}
function metCal(met,min,kg) { return Math.round((met*kg*3.5/200)*min); }
function latestW() {
  const e=Object.entries(db.weights).sort(([a],[b])=>b.localeCompare(a));
  return e.length?(e[0][1].kg||e[0][1]):db.profile.weight;
}
function currentMode() { return MODES.find(m=>m.id===db.mode)||MODES[0]; }

function switchTab(tab) {

render();

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const mode=currentMode();
  document.getElementById("modeEmoji").textContent=mode.emoji;
  document.getElementById("modeName").textContent=mode.name;

  if(currentTab==="today")     el.innerHTML=renderToday();

  document.querySelectorAll(".backdrop").forEach(b=>{b.onclick=e=>{if(e.target===b)b.style.display="none";};});
}

function renderHistory() {
  const allDays=Object.keys(db.logs).sort((a,b)=>b.localeCompare(a)).slice(0,14);
  const sleepLog=Object.entries(db.checkins).filter(([,ci])=>ci.sleep_hrs).sort(([a],[b])=>b.localeCompare(a)).slice(0,7);

  let html=`<div class="card"><div class="card-title">Weight trend</div>${weightChart()}</div>`;

  html+=`<div class="card"><div class="card-title">Daily log</div>`;
  if(!allDays.length) html+=`<div class="empty">No history yet</div>`;
  else allDays.forEach(date=>{
    const logs=dayLogs(date), total=foodCals(date)+drinkCals(date);
    const burn=actBurn(date), tgt=bmr()+burn-500, diff=total-tgt;
    const hydro=totalHydro(date), ci=db.checkins[date]||{};
    html+=`<div class="act-item">
      <div style="width:36px;text-align:center;font-size:18px">${ci.energy?["🪫","😐","🙂","💪","⚡"][ci.energy-1]:"—"}</div>
      <div class="f1">
        <div class="sm bold">${fmtDate(date)}</div>
        <div class="xs c-subtle">${logs.length} item${logs.length!==1?"s":""}${burn>0?" · 🏃 "+burn+" kcal":""} · 💧${hydro}ml</div>
      </div>
      <div class="tr">
        <div class="sm bold">${total} kcal</div>
        <div class="xs ${diff<=0?"c-green":"c-red"}">${diff<=0?"−"+Math.abs(diff):"+"+diff}</div>
      </div>
    </div>`;
  });
  html+=`</div>`;

  if(sleepLog.length) {
    html+=`<div class="card"><div class="card-title">Sleep log</div>`;
    sleepLog.forEach(([date,ci])=>{
      html+=`<div class="act-item">
        <div class="act-emoji">😴</div>
        <div class="f1"><div class="sm bold">${fmtDate(date)}</div><div class="xs c-subtle">${ci.sleep_hrs}h · quality ${ci.sleep_q||"?"}/5</div></div>

    });

  }
  return html;
}

function mbar(label,val,max,color) {
  const pct=Math.min(val/max*100,100).toFixed(1);
  return `<div class="mbar"><div class="mbar-top"><span>${label}</span><span class="mbar-val">${typeof val==="number"&&val>100?Math.round(val)+"ml":Math.round(val)+(label==="Hydration"?"ml":"g")}</span></div><div class="mbar-track"><div class="mbar-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}
function weightChart() {
  const entries=Object.entries(db.weights)
    .map(([d,v])=>[d,typeof v==="object"?v.kg:v])
    .filter(([,v])=>v)
    .sort(([a],[b])=>a.localeCompare(b)).slice(-14);
  if(entries.length<2) return `<div class="empty">Log at least 2 weights to see trend</div>`;
  const vals=entries.map(([,v])=>v), mn=Math.min(...vals)-.5, mx=Math.max(...vals)+.5;
  const W=280,H=80,px=i=>(i/(entries.length-1))*W,py=v=>H-((v-mn)/(mx-mn))*H;
  const pts=entries.map(([,v],i)=>`${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(" ");
  return `<div><svg width="100%" viewBox="0 0 ${W} ${H+24}" style="overflow:visible">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7c6ff7" stop-opacity=".3"/><stop offset="100%" stop-color="#7c6ff7" stop-opacity="0"/></linearGradient></defs>
    <polygon points="0,${H} ${pts} ${W},${H}" fill="url(#wg)"/>
    <polyline points="${pts}" fill="none" stroke="#7c6ff7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${entries.map(([,v],i)=>`<circle cx="${px(i).toFixed(1)}" cy="${py(v).toFixed(1)}" r="3.5" fill="#7c6ff7"/>`).join("")}
    <text x="0" y="${H+18}" font-size="10" fill="#3d5070">${entries[0][0].slice(5)}</text>
    <text x="${W}" y="${H+18}" font-size="10" fill="#3d5070" text-anchor="end">${entries[entries.length-1][0].slice(5)}</text>
    <text x="${W+4}" y="${py(vals[vals.length-1]).toFixed(1)}" font-size="10" fill="#7c6ff7" dominant-baseline="middle">${vals[vals.length-1]}kg</text>
  </svg></div>`;
}

function handlePhoto(input) {
  const file=input.files[0]; if(!file) return;
  const img=new Image();
  const reader=new FileReader();
  reader.onload=ev=>{
    img.onload=()=>{
      const MAX=1024;
      let w=img.width, h=img.height;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const canvas=document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL("image/jpeg",0.7);
      const[hdr,b64]=compressed.split(",");
      pendingPhoto={base64:b64,mime:"image/jpeg",preview:compressed};
      document.getElementById("photoPrev").src=compressed;
      document.getElementById("photoPrev").style.display="block";
      document.getElementById("removePhoto").style.display="inline-block";
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function clearPhoto(){pendingPhoto=null;document.getElementById("photoPrev").style.display="none";document.getElementById("removePhoto").style.display="none";document.getElementById("photoIn").value="";}

async function analyseLog() {
  const desc=document.getElementById("logDesc").value.trim();
  if(!desc&&!pendingPhoto){showErr("logErr","Add a description or photo");return;}
  document.getElementById("logErr").style.display="none";
  const btn=document.getElementById("analyseBtn");
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Analysing…';
  try {
    const mt=currentMode().macros;
    const isFood=logType==="food";
    const content=[];
    if(pendingPhoto) content.push({type:"image",source:{type:"base64",media_type:pendingPhoto.mime,data:pendingPhoto.base64}});

    let prompt;
    if(isFood) {
      prompt=`Nutrition expert. Mediterranean/Cypriot cuisine specialist. Analyse this meal.
Goal: ${currentMode().name}. Targets: protein ${mt.protein}g carbs ${mt.carbs}g fat ${mt.fat}g/day.
${desc?"Description: "+desc:"Image only."}
Context: ${PROFILE.context}
Reply ONLY valid JSON no markdown:
{"calories":number,"protein":number,"carbs":number,"fat":number,"name":"short name","confidence":"low|medium|high","notes":"one insight for their goal","macroTip":"specific tip","micros":{"zinc":"low|ok|high","vitD":"low|ok|high","magnesium":"low|ok|high","iron":"low|ok|high","omega3":"low|ok|high"}}`;
    } else {
      prompt=`Nutrition expert. Identify and analyse this drink for someone in Cyprus (hot climate, needs 2500ml hydration daily).
${desc?"Description: "+desc:"Image only — identify the drink from the photo."}
Estimate volume, hydration value (water=100%, juice=85%, milk=90%, coffee/tea=60% due to mild diuretic effect, alcohol=0%), caffeine, and calories.
If you cannot identify the drink from the info given, set "needsClarification" to a short question to ask the user.
Reply ONLY valid JSON no markdown:
{"name":"drink name","drink_type":"water|coffee|tea|juice|alcohol|milk|smoothie|other","volume_ml":number,"hydration_ml":number,"caffeine_mg":number,"calories":number,"confidence":"low|medium|high","notes":"one relevant tip","needsClarification":null}`;
    }
    content.push({type:"text",text:prompt});

    const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:500,messages:[{role:"user",content}]})});
    if(!r.ok) throw new Error("API "+r.status);
    const d=await r.json();
    const text=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    // Find outermost JSON object (handles nested objects like micros:{})
    const start=text.indexOf("{"), end=text.lastIndexOf("}");
    if(start===-1||end===-1) throw new Error("No JSON in response");
    pendingLog=JSON.parse(text.slice(start,end+1));
    pendingLog._isFood=isFood;

    const cc={high:"var(--green)",medium:"var(--yellow)",low:"var(--red)"}[pendingLog.confidence]||"var(--subtle)";
    document.getElementById("rName").textContent=pendingLog.name||desc;
    document.getElementById("rConf").textContent=pendingLog.confidence;
    document.getElementById("rConf").style.cssText=`background:${cc}22;color:${cc}`;
    document.getElementById("rNotes").textContent=pendingLog.notes?"💡 "+pendingLog.notes:"";
    document.getElementById("rTip").textContent=pendingLog.macroTip?"🎯 "+pendingLog.macroTip:"";

    if(isFood) {
      document.getElementById("rFoodMacros").style.display="block";
      document.getElementById("rDrinkInfo").style.display="none";
      document.getElementById("rCal").textContent=pendingLog.calories;
      document.getElementById("rPro").textContent=pendingLog.protein;
      document.getElementById("rCarb").textContent=pendingLog.carbs;
      document.getElementById("rFat").textContent=pendingLog.fat;
      // Show micro badges
      const micros=pendingLog.micros||{};
      document.getElementById("rMicros").innerHTML=Object.entries(micros).map(([k,v])=>{
        const col=v==="high"?"var(--green)":v==="low"?"var(--red)":"var(--subtle)";
        const names={zinc:"Zinc",vitD:"Vit D",magnesium:"Mg",iron:"Iron",omega3:"Omega-3"};
        return `<span class="micro-badge" style="background:${col}22;color:${col}">${names[k]||k}: ${v}</span>`;
      }).join("");
    } else {
      document.getElementById("rFoodMacros").style.display="none";
      document.getElementById("rDrinkInfo").style.display="block";
      document.getElementById("rMl").textContent=pendingLog.volume_ml||"?";
      document.getElementById("rHydro").textContent=pendingLog.hydration_ml||"?";
      document.getElementById("rCaff").textContent=pendingLog.caffeine_mg||0;
      document.getElementById("rDrinkCal").textContent=pendingLog.calories||0;
    }

    document.getElementById("logAnalyseBtn").style.display="none";
    document.getElementById("logResult").style.display="block";
  } catch(e){showErr("logErr","Analysis failed: "+e.message);btn.disabled=false;btn.textContent="Analyse with AI";}
}

function confirmLog() {
  if(!pendingLog) return;
  const t=today(), desc=document.getElementById("logDesc").value.trim();
  const isFood=pendingLog._isFood;

  if(!isFood && pendingLog.needsClarification) {
    const answer = prompt(pendingLog.needsClarification);
    if(answer) {
      document.getElementById("logDesc").value += " — " + answer;
      resetLog();
      analyseLog();
      return;
    }
  }
  const entry={
    id:Date.now().toString(),
    time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
    type:isFood?"food":(pendingLog.drink_type||"drink"),
    name:pendingLog.name||desc,
    confidence:pendingLog.confidence,
    notes:pendingLog.notes,
    preview:pendingPhoto?.preview||null,
    // Food fields
    calories:pendingLog.calories||0,
    protein:isFood?pendingLog.protein:0,
    carbs:isFood?pendingLog.carbs:0,
    fat:isFood?pendingLog.fat:0,
    micros:isFood?pendingLog.micros:null,
    // Drink fields
    ml:isFood?0:(pendingLog.volume_ml||0),
    hydro_ml:isFood?0:(pendingLog.hydration_ml||0),
    caffeine_mg:isFood?0:(pendingLog.caffeine_mg||0),
  };
  if(!db.logs[t]) db.logs[t]=[];
  db.logs[t].push(entry);
  save(); closeModal("logModal"); render();
}

  const days7=[...Array(7)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return d.toISOString().slice(0,10);});
  const allMicros={zinc:[],vitD:[],magnesium:[],iron:[],omega3:[]};
  days7.forEach(d=>dayLogs(d).filter(l=>l.micros).forEach(l=>{
    Object.entries(l.micros||{}).forEach(([k,v])=>{if(allMicros[k]) allMicros[k].push(v);});
  }));
  const summary=Object.entries(allMicros).map(([k,vals])=>{
    if(!vals.length) return `${k}: no data`;
    const lows=vals.filter(v=>v==="low").length, total=vals.length;
    return `${k}: ${lows}/${total} meals low`;
  }).join(", ");
  const prompt=`Nutritionist for Alex (fat loss goal, runs 30km/week, Cyprus, Mediterranean diet).
Micronutrient data from last 7 days of meals: ${summary}
Give a brief, specific, actionable weekly micronutrient summary. Flag any deficiencies and suggest 1-2 specific Cypriot/Mediterranean foods to fix them. Max 3 sentences.`;
  try{
    const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:200,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    db.microAlerts=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    db.microAlertsDate=today(); save(); render();
  }catch(e){alert("Micro check failed: "+e.message);}
}

function showErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display="block";}


// ── Strava OAuth ────────────────────────────────────────────────────────────────────────
let stravaLoading=false;
function stravaConnected(){return !!(db.stravaTokens&&db.stravaTokens.access_token);}
function connectStrava(){
  const url="https://www.strava.com/oauth/authorize?client_id="+STRAVA_CLIENT_ID+"&response_type=code&redirect_uri="+encodeURIComponent(window.location.origin+"/?strava=1")+"&approval_prompt=auto&scope=activity:read_all&state=nutrilens";
  window.location.href=url;
}
async function ensureFreshToken(){
  if(!db.stravaTokens) return null;
  const now=Math.floor(Date.now()/1000);
  if(db.stravaTokens.expires_at>now+300) return db.stravaTokens.access_token;
  try{
    const r=await fetch("/api/strava-refresh",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({refresh_token:db.stravaTokens.refresh_token})});
    const d=await r.json();
    if(d.access_token){db.stravaTokens={...db.stravaTokens,...d};save();return d.access_token;}
  }catch(e){console.warn("Token refresh:",e);}
  return null;
}
async function syncStrava(force=false){
  const t=today();
  if(!stravaConnected()) return;
  if(!force&&db.stravaCache[t]!==undefined) return;
  stravaLoading=true; render();
  try{
    const token=await ensureFreshToken();
    if(!token){stravaLoading=false;render();return;}
    const r=await fetch("/api/strava-activities",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({access_token:token,date:t})});
    const d=await r.json();
    if(Array.isArray(d.activities)){db.stravaCache[t]=d.activities;save();}
  }catch(e){console.warn("Strava sync:",e.message);}
  stravaLoading=false; render();
}
async function checkStravaCallback(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get("code"),state=params.get("state");
  if(!code||state!=="nutrilens") return;
  try{
    const r=await fetch("/api/strava-auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code})});
    const d=await r.json();
    if(d.access_token){db.stravaTokens=d;save();window.history.replaceState({},"","/");render();syncStrava(true);}
  }catch(e){console.warn("Strava auth:",e);}
}

// ── Init ─────────────────────────────────────────────────────────────────────────────────
checkStravaCallback();
render();
if(stravaConnected()) syncStrava();

</script>
